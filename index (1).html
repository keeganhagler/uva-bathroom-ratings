<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UVA Bathroom Rankings 🚽</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #f5f0e8;
    --ink: #1a1208;
    --gold: #c8963e;
    --gold-light: #e8bc6a;
    --cream: #faf7f0;
    --rust: #a63d2f;
    --sage: #4a6741;
    --paper: #ede8da;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    background: var(--ink);
    color: var(--cream);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust));
  }

  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  .subtitle {
    margin-top: 0.75rem;
    color: rgba(250,247,240,0.6);
    font-size: 0.95rem;
    font-family: 'DM Mono', monospace;
  }

  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: calc(100vh - 160px);
  }

  .sidebar {
    background: var(--cream);
    border-right: 1px solid var(--paper);
    overflow-y: auto;
    max-height: calc(100vh - 160px);
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    background: var(--cream);
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .review-btn-header {
    background: var(--ink);
    color: var(--gold);
    border: none;
    border-radius: 3px;
    padding: 0.35rem 0.65rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    display: inline-block;
  }
  .review-btn-header:hover { background: var(--rust); color: var(--cream); }

  #ranking-list { flex: 1; overflow-y: auto; }

  .bathroom-item {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--paper);
    cursor: pointer;
    transition: background 0.15s ease;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .bathroom-item:hover { background: var(--paper); }
  .bathroom-item.active { background: var(--ink); color: var(--cream); }
  .bathroom-item.active .score-bar-fill { background: var(--gold); }
  .bathroom-item.active .score-label { color: var(--gold); }
  .bathroom-item.active .location-name { color: var(--cream); }
  .bathroom-item.active .location-detail { color: rgba(250,247,240,0.55); }

  .rank-badge {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--gold);
    min-width: 2rem;
    text-align: center;
    flex-shrink: 0;
  }

  .bathroom-info { flex: 1; min-width: 0; }
  .location-name { font-weight: 500; font-size: 0.9rem; line-height: 1.3; color: var(--ink); }
  .location-detail { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: rgba(26,18,8,0.45); margin-top: 0.2rem; }

  .score-col { flex-shrink: 0; text-align: right; }
  .score-label { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--rust); line-height: 1; }
  .score-bar { height: 3px; background: var(--paper); border-radius: 2px; width: 48px; margin-top: 4px; }
  .score-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; }

  #map { height: calc(100vh - 160px); width: 100%; }

  .leaflet-popup-content-wrapper {
    background: var(--ink); color: var(--cream);
    border-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: none;
  }
  .leaflet-popup-tip { background: var(--ink); }
  .leaflet-popup-content { margin: 0; }
  .leaflet-popup-close-button { color: rgba(250,247,240,0.5) !important; font-size: 18px !important; top: 8px !important; right: 10px !important; }

  .popup-inner { padding: 1rem 1.25rem; min-width: 220px; max-width: 270px; }
  .popup-rank { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; margin-bottom: 0.3rem; }
  .popup-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; line-height: 1.3; color: var(--cream); margin-bottom: 0.5rem; }
  .popup-score { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--gold-light); line-height: 1; }
  .popup-score span { font-size: 0.9rem; color: rgba(250,247,240,0.5); font-family: 'DM Mono', monospace; font-weight: 400; }
  .popup-review-count { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: rgba(250,247,240,0.45); margin-top: 0.2rem; }

  .popup-cats { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.35rem; }
  .popup-cat { display: flex; justify-content: space-between; align-items: center; font-family: 'DM Mono', monospace; font-size: 0.68rem; color: rgba(250,247,240,0.65); }
  .popup-cat-bar { width: 60px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-left: 8px; }
  .popup-cat-fill { height: 100%; background: var(--gold); border-radius: 2px; }

  .popup-reviews { margin-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 0.75rem; }
  .popup-reviews-title { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; margin-bottom: 0.5rem; }
  .review-bubble { background: rgba(255,255,255,0.07); border-radius: 4px; padding: 0.5rem 0.65rem; margin-bottom: 0.4rem; font-size: 0.78rem; color: rgba(250,247,240,0.8); line-height: 1.4; }
  .review-bubble .r-cats { display: flex; gap: 0.5rem; flex-wrap: wrap; font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--gold-light); margin-bottom: 0.25rem; }

  .popup-review-btn {
    margin-top: 0.85rem; width: 100%; padding: 0.5rem;
    background: var(--gold); color: var(--ink); border: none; border-radius: 3px;
    font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; font-weight: 500;
    text-decoration: none; display: block; text-align: center;
    transition: background 0.15s;
  }
  .popup-review-btn:hover { background: var(--gold-light); }

  .loading-state {
    display: flex; align-items: center; justify-content: center;
    padding: 3rem; font-family: 'DM Mono', monospace; font-size: 0.8rem;
    color: rgba(26,18,8,0.4); letter-spacing: 0.1em; flex-direction: column; gap: 0.5rem;
  }

  .refresh-btn {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--ink);
    color: var(--gold);
    border: none;
    border-radius: 50px;
    padding: 0.6rem 1.1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: var(--rust); color: var(--cream); }

  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--sage); color: white; padding: 0.75rem 1.5rem;
    border-radius: 40px; font-family: 'DM Mono', monospace; font-size: 0.78rem;
    letter-spacing: 0.05em; z-index: 3000; transition: transform 0.3s ease; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { max-height: 45vh; position: relative; }
    #map { height: 55vh; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">University of Virginia · Unofficial Field Guide</div>
  <h1>The UVA Bathroom<br>Power Rankings</h1>
  <div class="subtitle">bathroom ratings and reviews</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span>Ranked by Score</span>
      <a class="review-btn-header" href="https://docs.google.com/forms/d/e/1FAIpQLSdy6gOE95KSWW8z_0Z2LCPOQQhD1wfE8lR-uhJt98EopLJZqQ/viewform" target="_blank">+ Review a Bathroom</a>
    </div>
    <div id="ranking-list"><div class="loading-state"><span>Loading bathrooms...</span></div></div>
  </aside>
  <div id="map"></div>
</div>

<button class="refresh-btn" onclick="loadData(true)">↻ Refresh Reviews</button>
<div class="toast" id="toast"></div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS9EMsacpm5N4113uRmBpQCFWJ-eKLVTmXKlPQLDZGEvWtqKHyLniVjN_meKbMieCGG7pDRJZvH7AsM/pub?output=csv';
const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdy6gOE95KSWW8z_0Z2LCPOQQhD1wfE8lR-uhJt98EopLJZqQ/viewform';

// Seed bathrooms with known locations
const SEED_BATHROOMS = [
  { name: "Shannon Library",          detail: "Floor 1 · Personal Bathroom", score: 9.25, lat: 38.0364566, lng: -78.5053683, rank: 1  },
  { name: "Garrett Hall",             detail: "2nd Floor",                   score: 9.0,  lat: 38.0342112, lng: -78.5055858, rank: 2  },
  { name: "1515 University Ave",      detail: "Upstairs Bathroom",           score: 8.7,  lat: 38.035209,  lng: -78.5004328, rank: 3  },
  { name: "Clemons Library",          detail: "Floor 4 · Left Side",         score: 8.65, lat: 38.036359,  lng: -78.50609,   rank: 4  },
  { name: "Student Health & Wellness",detail: "Floor 2",                     score: 8.5,  lat: 38.0301536, lng: -78.5038743, rank: 5  },
  { name: "French House",             detail: "Floor 1",                     score: 8.2,  lat: 38.0329556, lng: -78.5052975, rank: 6  },
  { name: "Gilmer Hall",              detail: "1st Floor",                   score: 8.0,  lat: 38.0341628, lng: -78.5128076, rank: 7  },
  { name: "Olsson Hall",              detail: "Bottom Floor · Family Room",  score: 7.5,  lat: 38.032088,  lng: -78.510695,  rank: 8  },
  { name: "Gilmer Hall 2nd",          detail: "2nd Floor",                   score: 6.95, lat: 38.0343,    lng: -78.5131,    rank: 9  },
  { name: "New Cabell Hall",          detail: "Floor 3 · Handicap Stall",    score: 6.7,  lat: 38.0326411, lng: -78.5052346, rank: 10 },
];

// Fuzzy match: find best seed bathroom for a review's name
function findSeedMatch(reviewName) {
  if (!reviewName) return null;
  const rn = reviewName.toLowerCase();
  let best = null, bestScore = 0;
  for (const s of SEED_BATHROOMS) {
    const sn = s.name.toLowerCase();
    // Check if key words match
    const words = sn.split(' ');
    let hits = words.filter(w => w.length > 3 && rn.includes(w)).length;
    if (hits > bestScore) { bestScore = hits; best = s; }
  }
  return bestScore >= 1 ? best : null;
}

// Parse CSV
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split('\t').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    // Handle quoted commas
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if ((c === ',' || c === '\t') && !inQ) { vals.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

// State
let bathroomMap = {}; // key -> { ...seed, reviews: [] }
let markers = {};

// Map
const map = L.map('map').setView([38.0335, -78.507], 15);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
}).addTo(map);

function medalFor(rank) {
  return rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank || '·';
}

function colorForScore(s) {
  return s >= 9 ? '#c8963e' : s >= 8 ? '#4a6741' : '#a63d2f';
}

function computeDisplayScore(b) {
  const r = b.reviews || [];
  if (!r.length) return +b.score;
  const revAvg = r.reduce((a, x) => a + (x.loc + x.cln + x.prv) / 3 * 2, 0) / r.length;
  return +((+b.score + revAvg) / 2).toFixed(2);
}

function makeIcon(rank, score) {
  const color = colorForScore(score);
  const label = rank && rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : (rank || '·');
  return L.divIcon({
    html: `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44">
      <ellipse cx="18" cy="42" rx="8" ry="3" fill="rgba(0,0,0,0.15)"/>
      <path d="M18 0 C8.6 0 1 7.6 1 17 C1 28 18 42 18 42 C18 42 35 28 35 17 C35 7.6 27.4 0 18 0Z" fill="${color}" stroke="white" stroke-width="1.5"/>
      <text x="18" y="20" text-anchor="middle" dominant-baseline="middle" font-family="DM Mono,monospace" font-size="${rank && rank<=3?14:12}" fill="white" font-weight="500">${label}</text>
    </svg>`,
    className: '', iconSize: [36,44], iconAnchor: [18,44], popupAnchor: [0,-46]
  });
}

function buildPopupHTML(key) {
  const b = bathroomMap[key];
  const score = computeDisplayScore(b);
  const r = b.reviews || [];
  const avg = (fn) => r.length ? (r.reduce((a,x)=>a+fn(x),0)/r.length).toFixed(1) : '—';
  const pct = (fn) => r.length ? r.reduce((a,x)=>a+fn(x),0)/r.length/5*100 : 0;

  const recentReviews = r.slice(-3).reverse().map(rv => `
    <div class="review-bubble">
      <div class="r-cats">
        <span>📍 ${rv.loc}/5</span><span>🧼 ${rv.cln}/5</span><span>🔒 ${rv.prv}/5</span>
        ${rv.gender ? `<span>· ${rv.gender}</span>` : ''}
      </div>
      ${rv.text ? `<div>${rv.text}</div>` : ''}
    </div>`).join('');

  return `<div class="popup-inner">
    <div class="popup-rank">${b.rank ? `Rank #${b.rank}` : 'Community Addition'}</div>
    <div class="popup-name">${b.name}${b.detail ? `<br><span style="font-size:0.8rem;font-weight:400;font-family:'DM Sans',sans-serif;color:rgba(250,247,240,0.6)">${b.detail}</span>` : ''}</div>
    <div class="popup-score">${score}<span> / 10</span></div>
    ${r.length ? `<div class="popup-review-count">${r.length} community review${r.length>1?'s':''}</div>` : ''}
    <div class="popup-cats">
      <div class="popup-cat"><span>📍 Location · ${avg(x=>x.loc)}</span><div class="popup-cat-bar"><div class="popup-cat-fill" style="width:${pct(x=>x.loc)}%"></div></div></div>
      <div class="popup-cat"><span>🧼 Cleanliness · ${avg(x=>x.cln)}</span><div class="popup-cat-bar"><div class="popup-cat-fill" style="width:${pct(x=>x.cln)}%"></div></div></div>
      <div class="popup-cat"><span>🔒 Privacy · ${avg(x=>x.prv)}</span><div class="popup-cat-bar"><div class="popup-cat-fill" style="width:${pct(x=>x.prv)}%"></div></div></div>
    </div>
    ${r.length ? `<div class="popup-reviews"><div class="popup-reviews-title">Recent Reviews</div>${recentReviews}</div>` : ''}
    <a class="popup-review-btn" href="${FORM_URL}" target="_blank">+ Write a Review</a>
  </div>`;
}

function addOrUpdateMarker(key) {
  const b = bathroomMap[key];
  if (!b.lat || !b.lng) return;
  const score = computeDisplayScore(b);
  if (markers[key]) {
    markers[key].setIcon(makeIcon(b.rank, score));
    if (markers[key].isPopupOpen()) markers[key].getPopup().setContent(buildPopupHTML(key));
  } else {
    const marker = L.marker([b.lat, b.lng], { icon: makeIcon(b.rank, score) })
      .addTo(map).bindPopup('', { maxWidth: 280 });
    marker.on('popupopen', () => {
      marker.getPopup().setContent(buildPopupHTML(key));
      document.querySelectorAll('.bathroom-item').forEach(el => el.classList.remove('active'));
      const el = document.getElementById(`item-${key}`);
      if (el) { el.classList.add('active'); el.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
    });
    markers[key] = marker;
  }
}

function renderSidebar() {
  const list = document.getElementById('ranking-list');
  list.innerHTML = '';
  const sorted = Object.entries(bathroomMap)
    .map(([k,b]) => ({ key: k, b, score: computeDisplayScore(b) }))
    .sort((a,b) => b.score - a.score);

  sorted.forEach(({ key, b, score }, i) => {
    const rank = b.rank || (i + 1);
    const item = document.createElement('div');
    item.className = 'bathroom-item';
    item.id = `item-${key}`;
    item.innerHTML = `
      <div class="rank-badge">${medalFor(rank)}</div>
      <div class="bathroom-info">
        <div class="location-name">${b.name}</div>
        <div class="location-detail">${b.detail || (b.reviews?.length ? `${b.reviews.length} review${b.reviews.length>1?'s':''}` : 'Community addition')}</div>
      </div>
      <div class="score-col">
        <div class="score-label">${score}</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${Math.min(score/10*100,100)}%"></div></div>
      </div>`;
    item.addEventListener('click', () => {
      document.querySelectorAll('.bathroom-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      if (b.lat && b.lng) {
        map.setView([b.lat, b.lng], 17, { animate: true });
        markers[key] && markers[key].openPopup();
      }
    });
    list.appendChild(item);
  });
}

async function loadData(isRefresh = false) {
  if (!isRefresh) {
    document.getElementById('ranking-list').innerHTML = '<div class="loading-state"><span>Loading bathrooms...</span></div>';
  }

  // Init seed bathrooms
  bathroomMap = {};
  SEED_BATHROOMS.forEach(s => {
    bathroomMap[s.name] = { ...s, reviews: [] };
  });

  try {
    const res = await fetch(SHEET_CSV + '&t=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);

    rows.forEach(row => {
      const rawName = row['Name of bathroom (e.g., Shannon 1 Men\'s east wing, Rice Hall 6th floor...)'] || '';
      const loc = parseFloat(row['Location (How easy is it to find and access?)']) || 0;
      const cln = parseFloat(row['Cleanliness (How clean and well-maintained is it?)']) || 0;
      const prv = parseFloat(row['Privacy (Lock quality, busyness, and people looking in)']) || 0;
      const text = row['Review (optional)'] || '';
      const gender = row['Gender'] || '';

      if (!rawName || (!loc && !cln && !prv)) return;

      const review = { loc, cln, prv, text, gender };

      // Try to match to a seed bathroom
      const seed = findSeedMatch(rawName);
      if (seed) {
        bathroomMap[seed.name].reviews.push(review);
      } else {
        // New community bathroom — no map pin but show in sidebar
        if (!bathroomMap[rawName]) {
          bathroomMap[rawName] = { name: rawName, detail: '', score: 0, reviews: [] };
        }
        bathroomMap[rawName].reviews.push(review);
        // Give it a score based on reviews
        const r = bathroomMap[rawName].reviews;
        bathroomMap[rawName].score = +(r.reduce((a,x)=>(a+(x.loc+x.cln+x.prv)/3*2),0)/r.length).toFixed(2);
      }
    });

    // Add/update markers
    Object.keys(bathroomMap).forEach(key => addOrUpdateMarker(key));
    renderSidebar();

    if (isRefresh) showToast('✓ Reviews updated!');
  } catch(e) {
    console.error(e);
    // Still show seed data even if sheet fails
    Object.keys(bathroomMap).forEach(key => addOrUpdateMarker(key));
    renderSidebar();
    if (isRefresh) showToast('Could not fetch latest reviews');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadData();

// Auto-refresh every 2 minutes
setInterval(() => loadData(false), 120000);
</script>
</body>
</html>
